<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Pulse Icon -->
  <path d="M5 22H12L15 12L20 32L23 22H30" stroke="url(#pulse-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" from="0, 100" to="100, 0" dur="3s" repeatCount="indefinite" />
  </path>
  
  <!-- Sparkle/AI Dot -->
  <circle cx="32" cy="18" r="2.5" fill="#A855F7" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Title Text -->
  <text x="38" y="27" fill="white" style="font-family: 'Inter', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: -0.02em; font-style: italic;">PULSE</text>
  <text x="96" y="27" fill="#A855F7" style="font-family: 'Inter', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: 0.05em;">AI</text>
</svg>
